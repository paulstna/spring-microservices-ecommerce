services:

  # Infrastructure services
  configserver:
    image: paulstna/config-server:latest
    container_name: config-server-ms
    ports:
      - "8888:8888"
    healthcheck:
      test: "curl --fail --silent localhost:8888/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yaml
      service: microservice-base-config

  eurekaserver:
    image: paulstna/eureka-server:latest
    container_name: eureka-server-ms
    ports:
      - "8761:8761"
    healthcheck:
      test: "curl --fail --silent localhost:8761/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    extends:
      file: common-config.yaml
      service: microservice-config-server-config
    environment:
      SPRING_APPLICATION_NAME: eureka-server

  gatewayserver:
    image: paulstna/gateway-server:latest
    container_name: gateway-server-ms
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: gateway-server
    extends:
      file: common-config.yaml
      service: microservice-eureka-server-config

  # Broker services   
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka-ms
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - paulstna

  redis:
    image: redis:7-alpine
    container_name: redis-ms
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - paulstna
      
  # Microservices

  inventory:
    image: paulstna/inventory:latest
    container_name: inventory-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: inventory

  user:
    image: paulstna/user:latest
    container_name: user-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: user

  payment:
    image: paulstna/payment:latest
    container_name: payment-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: payment

  delivery:
    image: paulstna/delivery:latest
    container_name: delivery-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: delivery

  order:
    image: paulstna/order:latest
    container_name: order-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: order
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  notification:
    image: paulstna/notification:latest
    container_name: notification-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: notification
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
        
  cart:
    image: paulstna/cart:latest
    container_name: cart-ms
    extends:
      file: common-config.yaml
      service: microservice-dev-config
    environment:
      SPRING_APPLICATION_NAME: cart
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

networks:
  paulstna:
    driver: "bridge"